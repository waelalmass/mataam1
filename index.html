<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galaxy Restaurant</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f0f0f;
color:white;
}

header{
background:black;
padding:25px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.search{
text-align:center;
padding:15px;
}

.search input{
width:80%;
padding:12px;
border:none;
border-radius:8px;
}

.categories{
display:flex;
gap:10px;
justify-content:center;
padding:10px;
}

.categories button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#1e1e1e;
color:white;
cursor:pointer;
}

.categories button:hover{
background:#00ff88;
color:black;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
max-width:1000px;
margin:auto;
}

.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.food-name{
font-size:18px;
font-weight:bold;
}

.food-price{
color:#00ff88;
margin:5px 0;
}

.card button{
width:100%;
padding:10px;
border:none;
background:#25D366;
color:white;
border-radius:6px;
cursor:pointer;
}

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:black;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.cart button{
background:#00ff88;
color:black;
border:none;
padding:10px 20px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<header>Galaxy Restaurant</header>

<div class="search">
<input type="text" placeholder="Search food..." onkeyup="searchFood(this.value)">
</div>

<div class="categories">

<button onclick="filterFood('all')">All</button>
<button onclick="filterFood('pasta')">Pasta</button>
<button onclick="filterFood('burger')">Burger</button>
<button onclick="filterFood('dessert')">Dessert</button>

</div>

<div class="menu" id="menu"></div>

<div class="cart">

<div id="total">Total: $0</div>

<button onclick="order()">Order WhatsApp</button>

</div>

<script>

let foods=[

{name:"Alfredo Pasta",price:10,category:"pasta",img:"https://images.unsplash.com/photo-1621996346565-e3dbc353d2e5"},

{name:"Mexican Pasta",price:8,category:"pasta",img:"https://images.unsplash.com/photo-1555949258-eb67b1ef0ceb"},

{name:"Cheese Burger",price:7,category:"burger",img:"https://images.unsplash.com/photo-1550547660-d9450f859349"},

{name:"Double Burger",price:9,category:"burger",img:"https://images.unsplash.com/photo-1606755962773-d324e0a13086"},

{name:"Lotus Crepe",price:5,category:"dessert",img:"https://images.unsplash.com/photo-1604908176997-43189e06a8d9"},

{name:"Chocolate Waffle",price:6,category:"dessert",img:"https://images.unsplash.com/photo-1563805042-7684c019e1cb"}

]

let cart=[]
let total=0

function loadFoods(list){

let menu=document.getElementById("menu")
menu.innerHTML=""

list.forEach(food=>{

menu.innerHTML+=`

<div class="card" data-name="${food.name.toLowerCase()}" data-category="${food.category}">

<img src="${food.img}">

<div class="card-body">

<div class="food-name">${food.name}</div>

<div class="food-price">$${food.price}</div>

<button onclick="addCart('${food.name}',${food.price})">Add to Cart</button>

</div>

</div>

`

})

}

loadFoods(foods)

function addCart(name,price){

cart.push(name+" - $"+price)

total+=price

document.getElementById("total").innerText="Total: $"+total

}

function order(){

let phone="96100000000"

let msg="Hello I want to order:%0A"

cart.forEach(i=>{

msg+=i+"%0A"

})

msg+="Total: $"+total

window.open("https://wa.me/"+phone+"?text="+msg)

}

function searchFood(value){

value=value.toLowerCase()

let filtered=foods.filter(f=>f.name.toLowerCase().includes(value))

loadFoods(filtered)

}

function filterFood(category){

if(category=="all"){

loadFoods(foods)

return

}

let filtered=foods.filter(f=>f.category==category)

loadFoods(filtered)

}

</script>

</body>

</html>
